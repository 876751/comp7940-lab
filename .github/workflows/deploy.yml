name: AWS EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest   # must be ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~/chatbot_comp7940
          git pull origin main

          sudo docker stop chatbot-container || true
          sudo docker rm chatbot-container || true
            
          # rebuild Docker image with new DockerFile
          sudo docker build -t chatbot-image .
            
          sudo docker run -d --name chatbot-container \
            -v /home/ec2-user/chatbot_comp7940/config.ini:/comp7940-lab/config.ini \
            --network chatbot-net \
            chatbot-image
            
          sudo docker image prune -f
          EOF
